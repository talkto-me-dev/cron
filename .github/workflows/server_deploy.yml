name: server deploy

env:
  TZ: Asia/Shanghai

on:
  workflow_dispatch:
    inputs:
      env:
        description: target env
        required: true
        type: choice
        options: [alpha, prod]

concurrency:
  group: server-deploy-${{ inputs.env }}
  cancel-in-progress: false

jobs:
  backend:
    runs-on: ubuntu-latest
    outputs:
      old_hashes: ${{ steps.run.outputs.old_hashes }}
      new_hashes: ${{ steps.run.outputs.new_hashes }}
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          gh_pat: ${{ secrets.GH_PAT }}
      - id: run
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          DEPLOY_ENV: ${{ inputs.env }}
        run: cd cron/server_deploy && ./backend.js

  frontend:
    needs: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          gh_pat: ${{ secrets.GH_PAT }}
      - env:
          DEPLOY_ENV: ${{ inputs.env }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
        run: cd cron/server_deploy && ./frontend.js

  notify:
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup
        with:
          gh_pat: ${{ secrets.GH_PAT }}
      - env:
          DEPLOY_ENV: ${{ inputs.env }}
          GITCODE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          OLD_HASHES: ${{ needs.backend.outputs.old_hashes }}
          NEW_HASHES: ${{ needs.backend.outputs.new_hashes }}
        run: cd cron/server_deploy && ./notify.js
